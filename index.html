<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="js/site-config.js"></script>
    <title>登录 — 学情数据看板</title>
    <link rel="stylesheet" href="css/style.css?v=20260625" />
  </head>
  <body class="login-page">
    <main class="login-card login-card--elevated" aria-label="集团登录">
      <div class="login-logo">学情数据看板</div>
      <div class="login-tagline">统一登录入口</div>
      <div class="login-field">
        <label class="visually-hidden" for="username">账号</label>
        <input
          class="input"
          type="text"
          id="username"
          name="username"
          placeholder="请输入账号"
          autocomplete="username"
        />
      </div>
      <div class="login-field-last">
        <label class="visually-hidden" for="password">密码</label>
        <input
          class="input"
          type="password"
          id="password"
          name="password"
          placeholder="请输入密码"
          autocomplete="current-password"
        />
      </div>
      <button type="button" class="btn btn-primary" id="loginBtn" onclick="handleLogin()">登录</button>
      <p class="login-hint">账号请联系管理员获取</p>
      <div id="fileProtocolWarn" class="login-file-warn" hidden role="alert">
        <strong>无法直接打开 HTML 文件</strong>
        <p>请双击项目中的 <code>start-local.bat</code> 启动本地服务，再在浏览器访问控制台显示的地址（一般为 <code>http://127.0.0.1:8080/index.html</code>）。</p>
        <p>也可双击 <code>打开看板.url</code>（需先启动服务）。</p>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="js/common.js?v=20260617"></script>
    <script src="js/login.js?v=20260617"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        try {
          if (location.protocol === 'file:') {
            var warn = document.getElementById('fileProtocolWarn');
            if (warn) warn.hidden = false;
            var btn = document.getElementById('loginBtn');
            if (btn) btn.disabled = true;
          }
          if (typeof applyLoginPageBranding === 'function') applyLoginPageBranding();
          if (typeof AppState !== 'undefined' && AppState.getUser && AppState.getSchool) {
            var user = AppState.getUser();
            if (user && AppState.getSchool()) {
              var href = user.user_level === '管理层' ? 'cockpit.html' : 'diagnosis.html';
              window.location.replace(href);
            }
          }
        } catch (e) {
          console.warn(e);
        }
      });
    </script>
  </body>
</html>
